<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repsol | Juego de Memoria</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="notificaciones"></div>

    <section id="pantalla-configuracion" class="pantalla activa">
        <h1>Repsol</h1>
        <div class="formulario-configuracion">
            <label>Modo de Juego:</label>
            <select id="selector-modo">
                <option value="solitario">Solitario Cronometrado</option>
                <option value="pvp">Multijugador Local (PvP)</option>
                <option value="libre">Modo Libre (Práctica)</option>
            </select>

            <div id="entradas-jugadores">
                <input type="text" id="nombre-jugador1" placeholder="Nombre Jugador 1" value="Jugador 1">
                <input type="text" id="nombre-jugador2" placeholder="Nombre Jugador 2" class="oculto">
            </div>

            <label>Dificultad:</label>
            <select id="selector-dificultad">
                <option value="16">Fácil (4x4)</option>
                <option value="36">Intermedio (6x6)</option>
                <option value="64">Difícil (8x8)</option>
            </select>

            <label>Temática Visual:</label>
            <select id="selector-tematica">
                <option value="animales">Animales</option>
                <option value="espacio">Espacio</option>
                <option value="frutas">Frutas</option>
            </select>

            <button id="btn-iniciar" class="btn primario">Iniciar Juego</button>
        </div>
    </section>

    <section id="pantalla-juego" class="pantalla oculto">
        <header id="panel-control">
            <div class="elemento-panel" id="panel-jugadores"></div>
            <div class="elemento-panel" id="panel-tiempo">Tiempo: 00:00</div>
            <div class="elemento-panel" id="panel-movimientos">Movimientos: 0</div>
            <button id="btn-reiniciar" class="btn secundario">Reiniciar</button>
        </header>
        <main id="contenedor-tablero">
            <div id="tablero"></div>
        </main>
    </section>

    <section id="pantalla-fin" class="pantalla oculto">
        <div class="tarjeta-fin">
            <h2>¡Partida Finalizada!</h2>
            <div id="estadisticas-fin"></div>
            <div id="logros-fin"></div>
            <div class="botones-fin">
                <button id="btn-jugar-nuevo" class="btn primario">Jugar de Nuevo</button>
                <button id="btn-volver-menu" class="btn secundario">Volver al Menú</button>
            </div>
        </div>
    </section>

    <script src="js/state.js"></script>
    <script src="js/themes.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/hud.js"></script>
    <script src="js/board.js"></script>
    <script src="js/game.js"></script>
    <script src="js/endScreen.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
